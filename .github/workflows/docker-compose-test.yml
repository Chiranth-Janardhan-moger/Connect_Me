name: Docker Compose Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'docker-compose*.yml'
      - 'backend/Dockerfile*'
      - '.github/workflows/docker-compose-test.yml'
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test Docker Compose Setup
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat > backend/.env << EOF
          NODE_ENV=development
          PORT=5000
          MONGO=mongodb://admin:admin123@mongodb:27017/connect-me?authSource=admin
          JWT_SECRET=test_jwt_secret
          EOF

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be ready..."
          sleep 30
          docker compose ps

      - name: Check backend health
        run: |
          max_attempts=10
          attempt=0
          until curl -f http://localhost:5000/health || [ $attempt -eq $max_attempts ]; do
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts: Waiting for backend..."
            sleep 5
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "Backend health check failed"
            docker compose logs backend
            exit 1
          fi
          
          echo "Backend is healthy!"

      - name: Check MongoDB connection
        run: |
          docker compose exec -T mongodb mongosh --eval "db.adminCommand('ping')" || exit 1
          echo "MongoDB is healthy!"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker compose logs backend
          echo "=== MongoDB Logs ==="
          docker compose logs mongodb
          echo "=== Redis Logs ==="
          docker compose logs redis

      - name: Cleanup
        if: always()
        run: docker compose down -v
